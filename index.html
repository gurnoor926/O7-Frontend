<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=\, initial-scale=1.0">
    <title>Stationary-items-froms</title>
</head>
<body>
    <h1>Welcome to the Stationary Items and Printing Services</h1>
    <h2>Customer Details : </h2>
    <form>
        <label for = "customer-name">Customer Name:</label>
        <input type = "text" id = "customer-name" name = "customer-name" required>
        <br><br>
    <h1>Stationary Items Form</h1>
    <form>
        <label for =" Items-list">Items List:</label>
        <select id = "Items-list" name = "Items-list" onchange = "unitPrice()">
            <option value = "item0">Select an item</option>
            <option value = "item1">Pen</option>
            <option value = "item2">Notebook</option>
            <option value = "item3">Stapler</option>
            <option value = "item4">Marker</option>
        </select>
        <br>
        <br>
        <label for = "quantity">Quantity:</label>
        <input type = "number" id = "quantity" name = "quantity" min = "1" value = "1" oninput = "applyDiscount()">
        <br>
        <br>
        <label for ="unit_price">Unit Price:</label>
        <input type = "text" id = "unit_price" name = "unit_price" readonly>
        <br>
        <br>
        <label for = "discount">Discount:</label>
        <input type = "text" id = "discount" name = "discount" readonly>
        <br>
        <br>
        <label for = "total">Total Price:</label>
        <input type = "text" id = "total" name = "total" readonly>
        <br>
        <br>

        <button type = "button" onclick = "calculateTotal()">Calculate Total</button>
    </form>
    <h1>Printing Services Form</h1>
     <form>
        <label for  = "Number-of-pages">Number of Pages:</label>
        <input type = "number" id = "Number-of-pages" name = "Number-of-pages" min = "1" value = "1">
        <br><br>
        <label for = "Print-type">Print type:</label>
        <select id = "Print-type" name = "Print-type">
            <option value = "print0">Select print type</option>
            <option value = "print1">Black and White</option>
            <option value = "print2">Color</option>
        </select>
        <br><br>
        <label for ="urgent-delivery">Urgent Delivery:</label>
        <input type = "checkbox" id = "urgent-delivery" name = "urgent-delivery">
        <br><br>
        <label for ="subtotal">Subtotal:</label>
        <input type = "text" id = "subtotal" name = "subtotal" readonly>
        <br><br>
        <label for = "discount-printing">Discount:</label>
        <input type = "text" id = "discount-printing" name = "discount" readonly>
        <br><br>
        <label for = "total-printing">Total Price:</label>
        <input type = "text" id = "total-printing" name = "total" readonly>
        <br><br>
        <button type = "button" onclick = "calculateTotalPrinting()">Calculate Total Printing</button>
    </form>
    <h1>Combined Calculation and Tax </h1>
        <form>
            <label for = "combined-total">Combined Total:</label>
            <input type = "text" id = "combined-total" name = "combined-total" readonly>
            <br><br>
            <label for = "tax">Tax (10%):</label>
            <input type = "text" id = "tax" name = "tax" readonly>
            <br><h5>Delivery Charge = ₹50</h5>
            <label for = "final-total">Final Total:</label>
            <input type = "text" id = "final-total" name = "final-total" readonly>
            <br><br>
            
            <button type = "button" onclick = "calculateFinalTotal()">Calculate Final Total</button>
        </form>
        <br>
        <br>
        <button type = "button" onclick = "window.location.href = './Invoice.html'">Generate Invoice</button>
    <script src = "./index.js"></script>
</body>
</html>
